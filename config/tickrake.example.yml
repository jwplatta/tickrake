timezone: America/Chicago
sqlite_path: ~/.tickrake/tickrake.sqlite3
default_provider: schwab
providers:
  schwab:
    adapter: schwab
    settings: {}
    symbol_map:
      /ES: ^ES
      /NQ: ^NQ
      /RTY: ^RTY
  ibkr-paper:
    adapter: ibkr
    settings:
      host: 127.0.0.1
      port: 7497
      client_id: 1001
  massive:
    adapter: massive
    settings: {}
options:
  snapshot_filename_timezone: utc
  root_tickers:
    SPXW: SPX
imports:
  spxw_massive_options:
    type: options
    provider: massive
    ticker: SPX
    option_root: SPXW
    paths:
      - /Volumes/ext_docs/options_trader/polygon/minute_aggs_v1/2025/10/2025-10-01.csv
storage:
  data_dir: ~/.tickrake/data
  history_dir: ~/.tickrake/data/history
  options_dir: ~/.tickrake/data/options
runtime:
  max_workers: 4
  retry_count: 2
  retry_delay_seconds: 2
  option_fetch_timeout_seconds: 30
  candle_fetch_timeout_seconds: 60
schedule:
  index_options:
    type: options
    provider: schwab
    interval_seconds: 300
    windows:
      - days: [mon, tue, wed, thu, fri]
        start: "08:30"
        end: "15:00"
    dte_buckets:
      - 0DTE
      - 1DTE
      - 2DTE
      - 3DTE
      - 4DTE
      - 5DTE
      - 6DTE
      - 7DTE
      - 8DTE
      - 9DTE
      - 10DTE
      - 30DTE
    universe:
      - symbol: $SPX
        option_root: SPXW
      - symbol: SPY
      - symbol: QQQ
  eod_candles:
    type: candles
    provider: ibkr-paper
    run_at: "16:05"
    days: [mon, tue, wed, thu, fri]
    lookback_days: 7
    universe:
      - symbol: $SPX
        start_date: "2020-01-01"
        frequencies: [day, 30min, 10min, 5min, minute]
      - symbol: SPY
        start_date: "2020-01-01"
        frequencies: [day, 30min, 10min, 5min, minute]
      - symbol: QQQ
        start_date: "2020-01-01"
        frequencies: [day, 30min, 10min, 5min, minute]
      - symbol: $VIX
        start_date: "2020-01-01"
        frequencies: [day]
      - symbol: $VIX9D
        start_date: "2020-01-01"
        frequencies: [day]
  spx_min_candles:
    type: candles
    provider: ibkr-paper
    interval_seconds: 120
    windows:
      - days: [mon, tue, wed, thu, fri]
        start: "08:30"
        end: "15:00"
    lookback_days: 7
    universe:
      - symbol: $SPX
        start_date: "2026-03-01"
        frequencies: [30min, 5min, minute]
  manual_candles:
    type: candles
    manual: true
    provider: ibkr-paper
    lookback_days: 7
    universe:
      - symbol: SPY
        start_date: "2020-01-01"
        frequencies: [day, minute]
      - symbol: QQQ
        start_date: "2020-01-01"
        frequencies: [day, minute]
